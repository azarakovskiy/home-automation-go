- id: '1753711382977'
  alias: '[Office] -> [Doorbell] Blink for detection'
  description: Blink for motion or person detection
  triggers:
  - type: motion
    device_id: bed464b80c82a989022619b1198390be
    entity_id: f33fd80504a03d08946a8fc7e34bb047
    domain: binary_sensor
    trigger: device
    for:
      hours: 0
      minutes: 0
      seconds: 5
    id: TRIGGER_DOORBELL_MOTION
  - type: turned_on
    device_id: bed464b80c82a989022619b1198390be
    entity_id: 566e5e17a47f599f0df8739f0c663b5f
    domain: binary_sensor
    trigger: device
    for:
      hours: 0
      minutes: 0
      seconds: 2
    id: TRIGGER_DOORBELL_PERSON
  conditions:
  - condition: or
    conditions:
    - condition: zone
      entity_id: person.alexey
      zone: zone.home
    - condition: zone
      entity_id: person.pok
      zone: zone.home
  - condition: time
    after: '10:00:00'
    before: '22:00:00'
  actions:
  - variables:
      previous_state: '{{ states(''light.office_lamp_moonlight'') }}'
      previous_brightness: '{{ state_attr(''light.office_lamp_moonlight'', ''brightness'')
        }}'
  - type: turn_on
    device_id: f455ed0aa9d378a80c5701a26f0a439e
    entity_id: cfa4a599541a0f25287f12f37e6696ba
    domain: light
    brightness_pct: 100
  - choose:
    - conditions:
      - condition: trigger
        id:
        - TRIGGER_DOORBELL_MOTION
      sequence:
      - repeat:
          sequence:
          - type: toggle
            device_id: f455ed0aa9d378a80c5701a26f0a439e
            entity_id: cfa4a599541a0f25287f12f37e6696ba
            domain: light
          - delay:
              hours: 0
              minutes: 0
              seconds: 3
              milliseconds: 0
          until:
          - type: is_no_motion
            condition: device
            device_id: bed464b80c82a989022619b1198390be
            entity_id: f33fd80504a03d08946a8fc7e34bb047
            domain: binary_sensor
            for:
              hours: 0
              minutes: 0
              seconds: 5
    - conditions:
      - condition: trigger
        id:
        - TRIGGER_DOORBELL_PERSON
      sequence:
      - repeat:
          sequence:
          - type: toggle
            device_id: f455ed0aa9d378a80c5701a26f0a439e
            entity_id: cfa4a599541a0f25287f12f37e6696ba
            domain: light
          - delay:
              hours: 0
              minutes: 0
              seconds: 0
              milliseconds: 500
          until:
          - type: is_off
            condition: device
            device_id: bed464b80c82a989022619b1198390be
            entity_id: 566e5e17a47f599f0df8739f0c663b5f
            domain: binary_sensor
            for:
              hours: 0
              minutes: 0
              seconds: 5
  - type: turn_off
    device_id: f455ed0aa9d378a80c5701a26f0a439e
    entity_id: cfa4a599541a0f25287f12f37e6696ba
    domain: light
  mode: restart
- id: '1754568814521'
  alias: '[Bedroom] -> [Speaker] Increase the volume for the trains'
  description: Increase white noise volume for the trains incoming
  triggers:
  - trigger: state
    entity_id:
    - sensor.train_departure_alert
    from: 'false'
    to: 'true'
  conditions:
  - condition: device
    device_id: 4a8ad54a3f8858ebf794613a05d2db29
    domain: media_player
    entity_id: 0224a26b3b466cc0eae4a556781fd8fe
    type: is_playing
    enabled: false
  actions:
  - variables:
      current_volume: '{{ state_attr(media_player.bedroom_speaker, ''volume_level'')
        | float(default=0.3) }}'
      target_volume: '{{ [current_volume + 0.2, 1.0] | min }}'
      volume_steps: 5
  - repeat:
      count: 5
      sequence:
      - delay:
          hours: 0
          minutes: 0
          seconds: 1
          milliseconds: 0
      - action: media_player.volume_set
        metadata: {}
        data:
          volume_level: "{{\n  current_volume +\n  (target_volume - current_volume)
            * (repeat.index / volume_steps)\n}}\n"
        target:
          device_id: 4a8ad54a3f8858ebf794613a05d2db29
    enabled: false
  - device_id: c629bd1d66d9e09815dee4d29522312f
    domain: mobile_app
    type: notify
    message: Train departing
    title: Train departing
  - delay:
      hours: 0
      minutes: 2
      seconds: 0
      milliseconds: 0
  - device_id: c629bd1d66d9e09815dee4d29522312f
    domain: mobile_app
    type: notify
    message: Train left
    title: Train left
  - repeat:
      count: 5
      sequence:
      - delay:
          hours: 0
          minutes: 0
          seconds: 1
          milliseconds: 0
      - action: media_player.volume_set
        metadata: {}
        data:
          volume_level: "{{\n  target_volume -\n  (target_volume - current_volume)
            * (repeat.index / volume_steps)\n}}\n"
        target:
          device_id: 4a8ad54a3f8858ebf794613a05d2db29
    enabled: false
  mode: restart
