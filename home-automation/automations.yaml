- id: '1757693573806'
  alias: '[helper] [modes] Manual override'
  description: ''
  triggers:
  - entity_id:
    - input_select.daytime_mode
    trigger: state
    id: TRIGGER_DAYTIME_MODE
    for:
      hours: 0
      minutes: 0
      seconds: 5
  - trigger: state
    entity_id:
    - input_boolean.office_laptop_charge_optimization_auto
    to: 'off'
    id: TRIGGER_LAPTOP_SMART_CHARGE
    for:
      hours: 0
      minutes: 0
      seconds: 5
  conditions:
  - condition: template
    value_template: '{{''trigger.event.context.user_id'' != null}}'
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: trigger
        id:
        - TRIGGER_DAYTIME_MODE
      - condition: state
        entity_id: input_boolean.daytime_mode_auto
        state: 'on'
      alias: Daytime mode auto is currently ON
    - alias: Triggered by laptop optimization
      condition: and
      conditions:
      - condition: trigger
        id:
        - TRIGGER_LAPTOP_SMART_CHARGE
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - TRIGGER_DAYTIME_MODE
      sequence:
      - target:
          entity_id: input_boolean.daytime_mode_auto
        action: input_boolean.turn_off
        data: {}
      - delay:
          hours: 0
          minutes: 30
          seconds: 0
          milliseconds: 0
      - target:
          entity_id: input_boolean.daytime_mode_auto
        action: input_boolean.turn_on
    - conditions:
      - condition: trigger
        id:
        - TRIGGER_LAPTOP_SMART_CHARGE
      sequence:
      - delay:
          hours: 4
          minutes: 0
          seconds: 0
          milliseconds: 0
      - action: input_boolean.turn_on
        data: {}
        target:
          entity_id: input_boolean.office_laptop_charge_optimization_auto
  mode: parallel
  max: 10
- id: '1758731758263'
  description: ''
  triggers:
  - trigger: time_pattern
    hours: '*'
  conditions: []
  actions:
  - alias: Turn off when prolonged not at home
    if:
    - condition: or
      conditions:
      - condition: state
        entity_id: input_select.house_mode
        state: Away
        for:
          hours: 2
          minutes: 0
          seconds: 0
      - condition: state
        entity_id: input_select.house_mode
        state: Travel
    then:
    - type: turn_off
      device_id: 750b149376b17978c997217021f077e4
      entity_id: a57afdf553f4b1d4764b0de5262645dd
      domain: switch
    - type: turn_off
      device_id: 2f03bd52e0287c35cb927001b5899f65
      entity_id: 8e631cb4f2666eed528a6897bbfd2939
      domain: switch
    - stop: Nobody at home
  - alias: Optimize laptop charger
    sequence:
    - condition: state
      entity_id: input_boolean.office_laptop_charge_optimization_auto
      state: 'on'
    - action: python_script.cheapest_electricity_hours
      data:
        hours_needed: 6
        window_hours: 12
        guaranteed_per_block:
          night: 3
          morning: 1
          day: 2
          evening: 1
        given_day: '{{ now().day }}'
        given_hour: '{{ now().hour }}'
      response_variable: CHEAPEST_HOURS
    - if:
      - condition: template
        value_template: '{{ CHEAPEST_HOURS.charge_now | default(false) }}'
      then:
      - type: turn_on
        device_id: 750b149376b17978c997217021f077e4
        entity_id: a57afdf553f4b1d4764b0de5262645dd
        domain: switch
      else:
      - type: turn_off
        device_id: 750b149376b17978c997217021f077e4
        entity_id: a57afdf553f4b1d4764b0de5262645dd
        domain: switch
      enabled: true
  - alias: Optimize vacuum charger
    sequence:
    - condition: state
      entity_id: input_boolean.living_room_vacuum_charge_optimization_auto
      state: 'on'
    - action: python_script.cheapest_electricity_hours
      data:
        hours_needed: 1
        window_hours: 12
        guaranteed_per_block:
          night: 2
          morning: 0
          day: 0
          evening: 0
        given_day: '{{ now().day }}'
        given_hour: '{{ now().hour }}'
      response_variable: CHEAPEST_HOURS
    - if:
      - condition: template
        value_template: '{{ CHEAPEST_HOURS.charge_now | default(false) }}'
      then:
      - type: turn_on
        device_id: 2f03bd52e0287c35cb927001b5899f65
        entity_id: 8e631cb4f2666eed528a6897bbfd2939
        domain: switch
      else:
      - type: turn_off
        device_id: 2f03bd52e0287c35cb927001b5899f65
        entity_id: 8e631cb4f2666eed528a6897bbfd2939
        domain: switch
      enabled: true
  mode: single
- id: '1759087619599'
  alias: '[Bedroom] Keep warm at night'
  description: "Maintains comfortable temperature for sleeping \U0001F634"
  triggers:
  - trigger: time_pattern
    hours: '*'
    minutes: '2'
  conditions:
  - condition: state
    entity_id: input_select.house_mode
    state: At home
  - condition: state
    entity_id: input_select.daytime_mode
    state:
    - Night
  - condition: numeric_state
    entity_id: sensor.zhimi_mc2_a727_temperature
