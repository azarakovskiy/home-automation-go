kitchen_start_dishwasher:
  alias: '[Kitchen] Start dishwasher'
  sequence:
  - data:
      runtime_minutes: 137
      weights:
      - 1
      - 5
      - 5
      - 2
      - 4
      - 4
      - 2
      max_delay_hours: 12
    action: python_script.get_delay_to_save_electricity
    response_variable: SMART_DELAY
  - variables:
      delay_seconds: '{{ SMART_DELAY.optimal_delay_seconds }}'
      start_at: '{{ SMART_DELAY.optimal_start_at_text }}'
      savings: '{{ SMART_DELAY.cost_savings_percent }}'
  - type: turn_on
    device_id: 2f3dd314ca9105f19cf209b9ea16f609
    entity_id: e0a9d2559d349ab83e5b256df11d760d
    domain: switch
  - if:
    - alias: Delay required
      condition: template
      value_template: '{{ delay_seconds > 0 }}'
    then:
    - alias: Announce and delay start
      parallel:
      - parallel:
        - action: tts.speak
          metadata: {}
          data:
            cache: true
            message: Dishwasher starts at {{ start_at }}, saving {{ savings }} percent
              on electricity!
            media_player_entity_id: media_player.living_room_google_home
          enabled: true
          target:
            entity_id: tts.piper
        - alias: Allow to set washing program
          sequence:
          - delay:
              hours: 0
              minutes: 0
              seconds: 5
              milliseconds: 0
          - type: turn_off
            device_id: 2f3dd314ca9105f19cf209b9ea16f609
            entity_id: e0a9d2559d349ab83e5b256df11d760d
            domain: switch
      - action: number.set_value
        metadata: {}
        data:
          value: '{{ delay_seconds }}'
        target:
          entity_id: number.dishwasher_socket_countdown
        enabled: true
      enabled: true
    else:
    - action: tts.speak
      metadata: {}
      data:
        cache: true
        message: Dishwasher starts now, saving {{ savings }} percent on electricity!
        media_player_entity_id: media_player.living_room_google_home
      enabled: true
      target:
        entity_id: tts.piper
    enabled: true
  mode: restart
  description: Starts a dishwasher trying to save energy
  icon: mdi:dishwasher
  fields: {}
laundry_schedule_washing_machine:
  alias: '[Laundry] Schedule washing machine'
  description: Smart schedules a washing machine to save electricity
  icon: mdi:washing-machine
  mode: single
  sequence:
  - action: python_script.get_delay_to_save_electricity
    data:
      runtime_minutes: 60
      weights:
      - 8
      - 8
      - 6
      - 6
      - 3
      - 2
      max_delay_hours: 5
    response_variable: SMART_DELAY
    enabled: false
  - if:
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.washing_machine_door
        state: closed
    then:
    - wait_for_trigger:
      - trigger: state
        entity_id:
        - sensor.washing_machine_door
        to: closed
        for:
          hours: 0
          minutes: 0
          seconds: 5
    alias: Wait for the door to be closed
  - sequence:
    - type: turn_on
      device_id: cc847439f3073f9752b9e68edfd1c936
      entity_id: ca8bf4a00c913296e48a65bf46ba5258
      domain: switch
    - wait_for_trigger:
      - type: turned_on
        device_id: cc847439f3073f9752b9e68edfd1c936
        entity_id: switch.washing_machine_power
        domain: switch
        for:
          seconds: 5
        trigger: device
    alias: Turn on the power
  - device_id: cc847439f3073f9752b9e68edfd1c936
    domain: select
    entity_id: bf60283ebf1ebbffff2ddea6e47dcd60
    type: select_option
    option: laundry_care_washer_program_mix
  - device_id: cc847439f3073f9752b9e68edfd1c936
    domain: select
    entity_id: 7df38dfe570fb2f4152b7ed54fc8261f
    type: select_option
    option: laundry_care_washer_enum_type_temperature_g_c_30
  - device_id: cc847439f3073f9752b9e68edfd1c936
    domain: select
    entity_id: 8d3f67f28675cfcbfb9e07a769ae52b1
    type: select_option
    option: laundry_care_washer_enum_type_spin_speed_r_p_m_1000
  fields: {}
dev_start_dishwasher:
  sequence:
  - event: event.custom_scheduled_start
    event_data:
      device: '{{ device_name }}'
      mode: '{{ mode }}'
      max_delay_hours: '{{ max_delay_hours }}'
  alias: Fire schedule event
  fields:
    device_name:
      selector:
        select:
          options:
          - dishwasher
    mode:
      selector:
        select:
          options:
          - auto
          - auto_quick
          - cancel
    max_delay_hours:
      selector:
        number:
          min: 1
          max: 24
          step: 1
      default: 12
  description: ''
'1762698068910':
  sequence:
  - event: ''
    event_data: {}
  fields:
    message:
      selector:
        text:
      name: Message
      required: true
    speaker:
      selector:
        text:
      name: Speaker
  alias: '[dev] [Helper] New notification event'
  description: ''
reminders_dev_create:
  alias: '[dev] Reminders: Fire create event'
  mode: single
  description: Helper script to craft a reminder payload from UI inputs.
  fields:
    reminder_id:
      name: Reminder ID
      required: true
      selector:
        text:
    title:
      name: Title
      selector:
        text:
    message:
      name: Message
      required: true
      selector:
        text:
    profile:
      name: Profile
      selector:
        select:
          options:
          - normal
          - annoying
          - quiet
          - one_time
      default: normal
    start_time:
      name: Start Time (ISO or HH:MM)
      selector:
        text:
      default: ''
    initial_repeat_minutes:
      name: Initial Repeat Minutes
      selector:
        number:
          min: 1
          max: 240
          step: 1
      default: 20
    speaker_entity:
      name: Speaker Entity
      selector:
        entity:
          domain: media_player
    phone_notifier:
      name: Phone Notifier Service
      selector:
        text:
    mode:
      name: Reminder Mode
      selector:
        select:
          options:
          - repeating
          - single
      default: repeating
    visible_to:
      name: Visible To (comma separated)
      selector:
        text:
  sequence:
  - event: event.home_go_reminder_create
    event_data:
      id: '{{ reminder_id }}'
      title: '{{ title }}'
      message: '{{ message }}'
      profile: '{{ profile }}'
      start_time: '{{ start_time }}'
      initial_repeat_minutes: '{{ initial_repeat_minutes | int(20) }}'
      mode: '{{ mode }}'
      speaker_entity: '{{ speaker_entity }}'
      phone_notifier: '{{ phone_notifier }}'
      visible_to: '{{ visible_to.split('','') | map(''trim'') | list if visible_to
        else [] }}'
reminders_dev_ack:
  alias: '[dev] Reminders: Ack'
  mode: single
  fields:
    reminder_id:
      name: Reminder ID
      required: true
      selector:
        text:
    user:
      name: User
      selector:
        text:
  sequence:
  - event: event.home_go_reminder_ack
    event_data:
      id: '{{ reminder_id }}'
      user: '{{ user }}'
reminders_dev_delete:
  alias: '[dev] Reminders: Delete'
  mode: single
  fields:
    reminder_id:
      name: Reminder ID
      required: true
      selector:
        text:
  sequence:
  - event: event.home_go_reminder_delete
    event_data:
      id: '{{ reminder_id }}'
send_custom_event_notify_from_ui:
  sequence:
  - event: event.custom_notify
    event_data:
      message: '{{ states(''input_text.notify_message'') }}'
  alias: Send custom.event_notify from UI
  description: ''
