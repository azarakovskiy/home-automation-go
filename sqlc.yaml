version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/tech/postgres/migrations/*.up.sql"
    queries: "internal/tech/postgres/sql/reminders.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/tech/postgres/sqlc"
        sql_package: "database/sql"
        emit_interface: true
        emit_json_tags: true
