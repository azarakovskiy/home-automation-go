version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/tech/sqlite/migrations/*.up.sql"
    queries: "internal/tech/sqlite/sql/reminders.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/tech/sqlite/sqlc"
        sql_package: "database/sql"
        emit_interface: true
        emit_json_tags: true
