[[stack]]
name = "home-go"

[stack.config]
# The Komodo-managed server to deploy on.
server = "your-server"

# Absolute path on the server where Komodo checks out the repo and runs compose.
run_directory = "/home/alexey/home-go"

# Komodo defaults to compose.yaml; explicit here for clarity.
file_paths = ["ops/deploy/compose.yaml"]

# Git source — Komodo clones this to run_directory on deploy.
git_provider = "github.com"
git_account = "azarakovskiy"
repo = "azarakovskiy/home-automation-go"
branch = "master"
