services:
  home-go:
    image: ghcr.io/azarakovskiy/home-go:master
    container_name: home-go
    restart: unless-stopped
    networks:
      - db
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      HA_URL: ${HA_URL}
      HA_AUTH_TOKEN: ${HA_AUTH_TOKEN}
      HA_MQTT_BROKER_URL: ${HA_MQTT_BROKER_URL}
      HA_MQTT_USERNAME: ${HA_MQTT_USERNAME}
      HA_MQTT_PASSWORD: ${HA_MQTT_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}

networks:
  db:
    external: true
