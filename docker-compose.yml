version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: home-go:latest
    container_name: home-go-automation
    environment:
      - HA_URL=${HA_URL}
      - HA_AUTH_TOKEN=${HA_AUTH_TOKEN}
    restart: unless-stopped
    # If your HA is on the same host and you want auto-discovery, uncomment:
    # network_mode: host

  # Optional: run a local Home Assistant for testing
  # home-assistant:
  #   image: ghcr.io/home-assistant/home-assistant:stable
  #   container_name: ha-local
  #   volumes:
  #     - ./ops/local/homeassistant:/config
  #     - /etc/localtime:/etc/localtime:ro
  #   environment:
  #     - TZ=UTC
  #   restart: unless-stopped
  #   network_mode: host
